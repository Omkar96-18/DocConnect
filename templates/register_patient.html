{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto animate-in fade-in slide-in-from-bottom-8 duration-700 mt-10 mb-20 px-4">
    
    <div class="text-center mb-10">
        <div class="inline-flex items-center gap-2 bg-blue-50 text-blue-700 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest mb-6 border border-blue-100">
            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
            Secure Patient Enrollment
        </div>
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Create Your Account</h2>
        <p class="text-slate-500 mt-2 text-sm font-medium">Join MedConnect to find doctors and manage your health journey.</p>
    </div>

    <div class="bg-white rounded-[3rem] shadow-[0_30px_60px_-15px_rgba(0,0,0,0.05)] border border-slate-100 p-10 md:p-12">
        <form action="{{ url_for('register_patient') }}" method="POST" class="space-y-6">
            
            <div class="group">
                <label class="block text-xs font-bold text-slate-500 mb-2 ml-1 uppercase tracking-wider">Legal Full Name</label>
                <input type="text" name="name" required 
                       class="w-full bg-slate-50 border-none rounded-2xl p-4 text-slate-700 font-semibold focus:ring-4 focus:ring-blue-100 transition-all placeholder-slate-300"
                       placeholder="e.g. Alexander Pierce">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-2 ml-1 uppercase tracking-wider">Username</label>
                    <input type="text" name="username" required 
                           class="w-full bg-slate-50 border-none rounded-2xl p-4 text-slate-700 font-semibold focus:ring-4 focus:ring-blue-100 transition-all">
                </div>
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-2 ml-1 uppercase tracking-wider">Email</label>
                    <input type="email" name="email" required 
                           class="w-full bg-slate-50 border-none rounded-2xl p-4 text-slate-700 font-semibold focus:ring-4 focus:ring-blue-100 transition-all">
                </div>
            </div>

            <div class="group">
                <label class="block text-xs font-bold text-slate-500 mb-2 ml-1 uppercase tracking-wider">Secure Password</label>
                <input type="password" name="password" required 
                       class="w-full bg-slate-50 border-none rounded-2xl p-4 text-slate-700 font-semibold focus:ring-4 focus:ring-blue-100 transition-all placeholder-slate-300"
                       placeholder="••••••••">
            </div>

            <div class="group">
                <label class="block text-xs font-bold text-slate-500 mb-2 ml-1 uppercase tracking-wider">Primary Contact No.</label>
                <input type="text" name="contact" required 
                       class="w-full bg-slate-50 border-none rounded-2xl p-4 text-slate-700 font-semibold focus:ring-4 focus:ring-blue-100 transition-all"
                       placeholder="+1 (555) 000-0000">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-2 ml-1 uppercase tracking-wider">Biological Gender</label>
                    <div class="relative">
                        <select name="gender" 
                                class="w-full bg-slate-50 border-none rounded-2xl p-4 text-slate-700 font-semibold focus:ring-4 focus:ring-blue-100 transition-all appearance-none cursor-pointer">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other / Decline to state</option>
                        </select>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-2 ml-1 uppercase tracking-wider">Blood Group</label>
                    <input type="text" name="blood_group" placeholder="e.g. AB-" 
                           class="w-full bg-slate-50 border-none rounded-2xl p-4 text-slate-700 font-semibold focus:ring-4 focus:ring-blue-100 transition-all">
                </div>
            </div>

            <div class="pt-6">
                <button type="submit" 
                        class="w-full bg-blue-600 text-white font-black py-5 rounded-[2rem] shadow-xl shadow-blue-100 hover:bg-slate-900 transition-all transform active:scale-[0.98] uppercase tracking-[0.2em] text-xs">
                    Register Account
                </button>
            </div>
        </form>
    </div>

    <p class="mt-8 text-center text-sm font-medium text-slate-500">
        Already have an account? 
        <a href="{{ url_for('login_patient') }}" class="text-blue-600 font-bold hover:underline ml-1">Login here</a>
    </p>
</div>
{% endblock %}
