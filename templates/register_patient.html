{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto animate-in fade-in slide-in-from-bottom-12 duration-1000 mt-12 mb-24 px-6">
    
    <div class="text-center mb-12">
        <div class="inline-flex items-center gap-3 bg-blue-50 text-blue-600 px-5 py-2.5 rounded-2xl text-[11px] font-bold uppercase tracking-[0.2em] mb-8 border border-blue-100/50 shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            Secure Patient Protocol
        </div>
        <h2 class="text-5xl font-black text-slate-900 tracking-tight mb-4">Create your <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">Health ID</span></h2>
        <p class="text-slate-500 text-lg font-medium max-w-lg mx-auto leading-relaxed">Join thousands of patients receiving world-class digital care through the MedConnect network.</p>
    </div>

    <div class="bg-white/80 backdrop-blur-2xl rounded-[3.5rem] border border-slate-200/60 p-10 md:p-16 shadow-[0_32px_64px_-16px_rgba(0,0,0,0.08)] relative">
        
        <div class="absolute -top-32 -left-32 w-64 h-64 bg-blue-100/40 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="absolute -bottom-32 -right-32 w-64 h-64 bg-indigo-100/40 rounded-full blur-[100px] pointer-events-none"></div>

        <form action="{{ url_for('register_patient') }}" method="POST" class="space-y-8 relative z-10">
            
            <div class="flex items-center gap-4 mb-4">
                <div class="h-px flex-1 bg-slate-100"></div>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Personal Profile</span>
                <div class="h-px flex-1 bg-slate-100"></div>
            </div>

            <div class="group">
                <label class="block text-xs font-bold text-slate-500 mb-3 ml-2 uppercase tracking-widest">Legal Full Name</label>
                <input type="text" name="name" required 
                       class="w-full bg-slate-50/50 border border-slate-200 rounded-2xl p-5 text-slate-900 font-semibold focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500/50 transition-all placeholder-slate-400 outline-none"
                       placeholder="e.g. Dr. Alexander Pierce">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-3 ml-2 uppercase tracking-widest">Username</label>
                    <input type="text" name="username" required 
                           class="w-full bg-slate-50/50 border border-slate-200 rounded-2xl p-5 text-slate-900 font-semibold focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500/50 transition-all outline-none"
                           placeholder="alex_p">
                </div>
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-3 ml-2 uppercase tracking-widest">Email Address</label>
                    <input type="email" name="email" required 
                           class="w-full bg-slate-50/50 border border-slate-200 rounded-2xl p-5 text-slate-900 font-semibold focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500/50 transition-all outline-none"
                           placeholder="name@example.com">
                </div>
            </div>

            <div class="flex items-center gap-4 py-4">
                <div class="h-px flex-1 bg-slate-100"></div>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Security & Contact</span>
                <div class="h-px flex-1 bg-slate-100"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-3 ml-2 uppercase tracking-widest">Secure Password</label>
                    <input type="password" name="password" required 
                           class="w-full bg-slate-50/50 border border-slate-200 rounded-2xl p-5 text-slate-900 font-semibold focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500/50 transition-all outline-none"
                           placeholder="••••••••">
                </div>
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-3 ml-2 uppercase tracking-widest">Phone Number</label>
                    <input type="text" name="contact" required 
                           class="w-full bg-slate-50/50 border border-slate-200 rounded-2xl p-5 text-slate-900 font-semibold focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500/50 transition-all outline-none"
                           placeholder="+1 (555) 000-0000">
                </div>
            </div>

            <div class="flex items-center gap-4 py-4">
                <div class="h-px flex-1 bg-slate-100"></div>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Biometrics</span>
                <div class="h-px flex-1 bg-slate-100"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-3 ml-2 uppercase tracking-widest">Biological Class</label>
                    <div class="relative">
                        <select name="gender" 
                                class="w-full bg-slate-50/50 border border-slate-200 rounded-2xl p-5 text-slate-900 font-semibold focus:ring-4 focus:ring-blue-500/10 transition-all appearance-none cursor-pointer outline-none">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other / Decline</option>
                        </select>
                        <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-3 ml-2 uppercase tracking-widest">Blood Group</label>
                    <input type="text" name="blood_group" placeholder="e.g. B+" 
                           class="w-full bg-slate-50/50 border border-slate-200 rounded-2xl p-5 text-slate-900 font-semibold focus:ring-4 focus:ring-blue-500/10 transition-all outline-none">
                </div>
            </div>

            <div class="pt-10">
                <button type="submit" 
                        class="w-full bg-slate-900 text-white font-bold py-6 rounded-[2rem] shadow-2xl shadow-slate-200 hover:bg-blue-600 transition-all transform hover:-translate-y-1 active:scale-[0.98] uppercase tracking-[0.3em] text-xs flex items-center justify-center gap-3">
                    Initialize Registration
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>
        </form>
    </div>

    <p class="mt-12 text-center text-sm font-semibold text-slate-400">
        Already a member of the network? 
        <a href="{{ url_for('login_patient') }}" class="text-blue-600 hover:text-indigo-600 transition-colors ml-2 underline underline-offset-8">Access Portal</a>
    </p>
</div>
{% endblock %}
