{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto flex flex-col h-[70vh] bg-white rounded-3xl shadow-sm border border-slate-200">
    <div class="p-4 border-b border-slate-100 flex items-center gap-3">
        <a href="{{ url_for('messages_list') }}" class="text-slate-400 hover:text-slate-600">←</a>
        <h3 class="font-bold text-slate-800">{{ recipient.name }}</h3>
    </div>

    <div class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50">
        {% for msg in history %}
        <div class="flex {% if msg.sender_id == session['user_id'] and msg.sender_role == session['role'] %} justify-end {% endif %}">
            <div class="max-w-[70%] p-3 rounded-2xl text-sm 
                {% if msg.sender_id == session['user_id'] and msg.sender_role == session['role'] %}
                    bg-blue-600 text-white rounded-tr-none
                {% else %}
                    bg-white text-slate-700 border border-slate-200 rounded-tl-none
                {% endif %}">
                {{ msg.message_text }}
                <div class="text-[10px] mt-1 opacity-70">{{ msg.created_at.strftime('%H:%M') }}</div>
            </div>
        </div>
        {% endfor %}
    </div>

    <form action="{{ url_for('send_message', receiver_id=contact_id) }}" method="POST" class="p-4 border-t border-slate-100 flex gap-2">
        <input type="text" name="message_text" placeholder="Type your message..." class="flex-1 bg-slate-100 border-none rounded-xl px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-semibold hover:bg-blue-700 transition">Send</button>
    </form>
</div>
{% endblock %}
