{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-700 px-4">
    
    <div class="mb-10 text-center md:text-left">
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Personal Health Record</h2>
        <p class="text-slate-500 mt-2 text-sm font-medium">Keep your medical details updated for accurate care.</p>
    </div>

    <form method="POST" class="space-y-8">
        <div class="bg-white rounded-[2.5rem] shadow-[0_10px_40px_rgba(0,0,0,0.03)] border border-slate-100 p-8 md:p-12 relative overflow-hidden">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-1.5 h-5 bg-blue-600 rounded-full"></div>
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Identification & Logistics</h3>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-8">
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">Full Legal Name</label>
                    <input type="text" name="name" value="{{ patient.name }}" 
                           class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-semibold text-slate-700 focus:ring-2 focus:ring-blue-100 transition-all">
                </div>
                
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">Contact Number</label>
                    <input type="text" name="contact_no" value="{{ patient.contact_no }}" 
                           class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-semibold text-slate-700 focus:ring-2 focus:ring-blue-100 transition-all">
                </div>
                
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">Date of Birth</label>
                    <input type="date" name="date_of_birth" value="{{ patient.date_of_birth }}" 
                           class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-semibold text-slate-700 focus:ring-2 focus:ring-blue-100 transition-all">
                </div>
                
                <div class="group">
                    <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">Blood Group</label>
                    <input type="text" name="blood_group" value="{{ patient.blood_group }}" 
                           placeholder="e.g. O Positive"
                           class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-semibold text-slate-700 focus:ring-2 focus:ring-blue-100 transition-all">
                </div>
            </div>

            <div class="mt-8 group">
                <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">Home Address</label>
                <textarea name="address" rows="2" 
                          class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-semibold text-slate-700 focus:ring-2 focus:ring-blue-100 transition-all">{{ patient.address }}</textarea>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-rose-50/30 border border-rose-100 rounded-[2.5rem] p-10 group hover:bg-rose-50/50 transition-colors">
                <div class="flex items-center gap-2 mb-4">
                    <svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    <label class="text-sm font-black text-rose-800 uppercase tracking-widest">Known Allergies</label>
                </div>
                <input type="text" name="allergies" value="{{ patient.allergies }}" 
                       placeholder="Enter any medicine or food allergies"
                       class="w-full bg-white border-none rounded-2xl p-4 text-sm font-semibold text-rose-900 shadow-sm focus:ring-2 focus:ring-rose-200 transition-all placeholder-rose-200">
                <p class="mt-3 text-[10px] text-rose-400 font-bold ml-1 uppercase tracking-tighter">Critical Information for Emergency Staff</p>
            </div>

            <div class="bg-blue-50/30 border border-blue-100 rounded-[2.5rem] p-10 group hover:bg-blue-50/50 transition-colors">
                <div class="flex items-center gap-2 mb-4">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <label class="text-sm font-black text-blue-800 uppercase tracking-widest">Surgical & Med History</label>
                </div>
                <textarea name="medical_history" rows="3" 
                          placeholder="Briefly list past conditions or surgeries"
                          class="w-full bg-white border-none rounded-2xl p-4 text-sm font-semibold text-blue-900 shadow-sm focus:ring-2 focus:ring-blue-200 transition-all placeholder-blue-200">{{ patient.medical_history }}</textarea>
            </div>
        </div>

        <div class="pt-6">
            <button type="submit" 
                    class="w-full bg-slate-900 text-white font-black py-5 rounded-[2rem] shadow-2xl shadow-slate-200 hover:bg-blue-600 hover:shadow-blue-200 transition-all transform active:scale-[0.98] uppercase tracking-[0.2em] text-sm">
                Commit Updates to Record
            </button>
            <p class="text-center text-[10px] text-slate-400 mt-6 font-bold uppercase tracking-widest">
                Last Verified Synchronized: 2026-03-30
            </p>
        </div>
    </form>
</div>
{% endblock %}
