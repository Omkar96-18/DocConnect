{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto animate-in fade-in slide-in-from-bottom-12 duration-1000 mt-20 mb-20 px-4">
    
    <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 bg-blue-50/80 text-blue-600 px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-[0.25em] mb-6 border border-blue-100/50 shadow-sm">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            Patient Secure Node
        </div>
        <h2 class="text-4xl font-black text-slate-900 tracking-tight">Welcome <span class="text-blue-600">Back</span></h2>
        <p class="text-slate-400 mt-2 text-sm font-medium leading-relaxed">Your health journey continues here.</p>
    </div>

    <div class="group bg-white rounded-[3.5rem] shadow-[0_40px_80px_-15px_rgba(59,130,246,0.08)] border border-slate-100/80 p-10 md:p-12 relative overflow-hidden transition-all duration-500 hover:shadow-[0_50px_100px_-20px_rgba(59,130,246,0.12)]">
        
        <div class="absolute -top-24 -left-24 w-64 h-64 bg-blue-50/60 rounded-full blur-[100px] pointer-events-none group-hover:bg-blue-100 transition-colors duration-700"></div>
        
        <form action="{{ url_for('login_patient') }}" method="POST" class="space-y-7 relative z-10">
            
            <div class="space-y-2">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Personal Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-300 transition-colors group-focus-within:text-blue-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <input type="text" name="username" required 
                           class="block w-full bg-slate-50/50 border border-transparent rounded-[1.5rem] py-4.5 pl-14 pr-5 text-slate-900 font-semibold focus:bg-white focus:ring-4 focus:ring-blue-500/5 focus:border-blue-500/30 transition-all placeholder-slate-300 outline-none" 
                           placeholder="Enter username">
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Private Password</label>
                    <a href="#" class="text-[10px] font-bold text-blue-500 hover:text-blue-700 transition-colors uppercase tracking-widest">Reset</a>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-300 transition-colors group-focus-within:text-blue-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                    </div>
                    <input type="password" name="password" required 
                           class="block w-full bg-slate-50/50 border border-transparent rounded-[1.5rem] py-4.5 pl-14 pr-5 text-slate-900 font-semibold focus:bg-white focus:ring-4 focus:ring-blue-500/5 focus:border-blue-500/30 transition-all placeholder-slate-300 outline-none"
                           placeholder="••••••••">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-5 rounded-[1.5rem] shadow-xl shadow-blue-200 hover:bg-blue-700 hover:shadow-blue-300/50 transition-all transform hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-3">
                    Open My Portal
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>
        </form>

        <div class="mt-12 pt-10 border-t border-slate-50 text-center relative z-10">
            <p class="text-xs text-slate-400 font-semibold">
                New to the MedConnect community? 
                <a href="{{ url_for('register_patient') }}" class="text-blue-600 font-black hover:text-blue-700 ml-1 underline underline-offset-8">Begin Journey</a>
            </p>
            
            <div class="mt-8">
                <a href="{{ url_for('login_doctor') }}" class="inline-flex items-center gap-3 px-6 py-3 rounded-full bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] hover:bg-blue-50 hover:text-blue-600 transition-all group/switch">
                    <svg class="w-4 h-4 transition-transform group-hover/switch:-rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    Switch to Doctor Workspace
                </a>
            </div>
        </div>
    </div>
    
    <div class="mt-12 flex justify-center items-center gap-8 opacity-40">
        <div class="flex items-center gap-2">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
            <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">End-to-End Encrypted</span>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
            <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">24/7 Verified Access</span>
        </div>
    </div>
</div>

<style>
    /* Custom padding for better vertical balance in the inputs */
    .py-4\.5 {
        padding-top: 1.125rem;
        padding-bottom: 1.125rem;
    }
</style>
{% endblock %}
