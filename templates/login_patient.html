{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto animate-in fade-in zoom-in duration-700 mt-16 px-4">
    <div class="bg-white rounded-[3rem] shadow-[0_20px_60px_-15px_rgba(59,130,246,0.1)] border border-blue-50/50 p-10 relative overflow-hidden">
        
        <div class="absolute -top-12 -left-12 w-32 h-32 bg-blue-50 rounded-full blur-2xl opacity-60"></div>

        <div class="text-center mb-10 relative z-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-50 rounded-3xl mb-6">
                <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-3.614A9.99 9.99 0 0010 11.5a9.99 9.99 0 0110 9.571m-3.44-3.614A9.99 9.99 0 0014 11.5V10c0-3.314-2.686-6-6-6S2 6.686 2 10v1.5a9.99 9.99 0 013.44 3.614z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-slate-800 tracking-tight">Welcome Back</h2>
            <p class="text-slate-400 mt-2 text-sm font-medium">Step into your personal care space</p>
        </div>
        
        <form action="{{ url_for('login_patient') }}" method="POST" class="space-y-6 relative z-10">
            <div class="group">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2">Username</label>
                <input type="text" name="username" required 
                       class="block w-full bg-blue-50/50 border-2 border-transparent rounded-2xl p-4 text-slate-700 font-medium focus:bg-white focus:border-blue-100 focus:ring-4 focus:ring-blue-50/50 transition-all placeholder-slate-300" 
                       placeholder="Enter your username">
            </div>

            <div class="group">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2">Password</label>
                <input type="password" name="password" required 
                       class="block w-full bg-blue-50/50 border-2 border-transparent rounded-2xl p-4 text-slate-700 font-medium focus:bg-white focus:border-blue-100 focus:ring-4 focus:ring-blue-50/50 transition-all placeholder-slate-300"
                       placeholder="••••••••">
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-100 hover:bg-blue-700 hover:shadow-blue-200 transition-all transform active:scale-[0.98]">
                    Enter My Portal
                </button>
            </div>
        </form>

        <div class="mt-10 pt-8 border-t border-slate-50 text-center relative z-10">
            <p class="text-xs text-slate-400 font-medium">
                New to MedConnect? 
                <a href="{{ url_for('register_patient') }}" class="text-blue-600 font-bold hover:text-blue-700 ml-1">Begin Your Journey</a>
            </p>
            <div class="mt-4">
                <a href="{{ url_for('login_doctor') }}" class="inline-flex items-center text-[10px] font-bold text-slate-300 uppercase tracking-widest hover:text-slate-500 transition-colors">
                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
                    Switch to Doctor Portal
                </a>
            </div>
        </div>
    </div>
    
    <p class="text-center text-[10px] text-slate-300 mt-8 font-medium">
        Secure & Private &middot; HIPAA Mindful &middot; MedConnect &copy; 2026
    </p>
</div>
{% endblock %}
