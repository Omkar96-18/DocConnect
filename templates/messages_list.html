{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h2 class="text-2xl font-bold mb-6">Your Conversations</h2>
    <div class="space-y-4">
        {% for contact in contacts %}
        <a href="{{ url_for('chat', contact_id=contact.id) }}" class="block p-4 bg-white rounded-2xl border border-slate-200 hover:border-blue-400 transition shadow-sm">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold">
                    {{ contact.name[0] }}
                </div>
                <div>
                    <h3 class="font-semibold text-slate-900">{{ contact.name }}</h3>
                    <p class="text-sm text-slate-500">{{ contact.subtext }}</p>
                </div>
            </div>
        </a>
        {% else %}
        <div class="text-center py-10 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
            <p class="text-slate-500">No active conversations found.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
